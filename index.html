<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CatoCode - Pro Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div id="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h2>CatoCode</h2>
                <button id="share-btn" class="header-btn" title="Share Project"><i class="fas fa-share-alt"></i> Share</button>
            </header>
            <div class="file-explorer">
                <div class="file-actions">
                    <button id="new-file-btn"><i class="fas fa-plus"></i> New File</button>
                    <button id="new-folder-btn"><i class="fas fa-folder-plus"></i> New Folder</button>
                    <button id="upload-file-btn"><i class="fas fa-upload"></i> Upload</button>
                    <input type="file" id="upload-input" multiple hidden>
                </div>
                <div id="file-tree"></div>
            </div>
        </aside>

        <main class="main-content">
            <div id="editor-container">
                <div id="editor-placeholder">
                    <i class="fas fa-code"></i>
                    <p>Select a file to start editing</p>
                </div>
                <div id="editor" style="display: none;"></div>
            </div>
            <div class="preview-console-container">
                <div class="pc-tabs">
                    <button class="pc-tab-btn active" data-target="preview-wrapper">Preview</button>
                    <button class="pc-tab-btn" data-target="console-wrapper">Console</button>
                </div>
                <div class="pc-content">
                    <div id="preview-wrapper" class="pc-panel active">
                        <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>
                    </div>
                    <div id="console-wrapper" class="pc-panel">
                        <div class="console-toolbar">
                            <span>Console</span>
                            <button id="clear-console-btn" title="Clear console"><i class="fas fa-ban"></i> Clear</button>
                        </div>
                        <div id="console-output"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Share Link Modal -->
    <div id="share-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="modal-close" id="modal-close-btn">&times;</button>
            <h3>Your project is ready!</h3>
            <p>Share this link with others to view your live site.</p>
            <div class="share-link-wrapper">
                <input type="text" id="share-link-input" readonly>
                <button id="copy-link-btn" title="Copy to Clipboard"><i class="fas fa-copy"></i></button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.15.2/ace.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
