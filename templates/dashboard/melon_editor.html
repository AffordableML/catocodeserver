{% extends "dashboard/layout.html" %}
{% block dashboard_content %}
<div class="h-full flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between mb-4 pb-4 border-b-4 border-black">
        <div class="flex items-center gap-4">
            <a href="/melon-games" class="bg-slate-200 hover:bg-slate-300 px-4 py-2 rounded-lg border-2 border-black font-black neo-btn">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div>
                <input type="text" id="gameName" value="{{ game.name if game else 'Untitled Game' }}" 
                    class="text-2xl font-black bg-transparent border-none focus:outline-none focus:ring-2 focus:ring-[#8b5cf6] rounded px-2" />
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="exportGame('html')" class="bg-[#ffc900] text-black px-4 py-2 rounded-lg border-2 border-black font-black text-sm neo-btn">
                <i class="fas fa-download"></i> Export HTML
            </button>
            <button onclick="exportGame('zip')" class="bg-[#20ffad] text-black px-4 py-2 rounded-lg border-2 border-black font-black text-sm neo-btn">
                <i class="fas fa-file-archive"></i> Export ZIP
            </button>
            <button onclick="playGame()" class="bg-[#8b5cf6] text-white px-4 py-2 rounded-lg border-2 border-black font-black text-sm neo-btn">
                <i class="fas fa-play"></i> Play
            </button>
            <button onclick="saveGame()" class="bg-[#20ffad] text-black px-6 py-2 rounded-lg border-2 border-black font-black text-sm neo-btn">
                <i class="fas fa-save"></i> Save
            </button>
        </div>
    </div>

    <div class="flex-1 flex gap-4 overflow-hidden">
        <!-- Left Panel: Entity List -->
        <div class="w-64 bg-white border-4 border-black rounded-xl overflow-hidden flex flex-col">
            <div class="bg-[#8b5cf6] text-white px-4 py-3 font-black border-b-4 border-black">
                <i class="fas fa-layer-group mr-2"></i> Entities
            </div>
            <div class="p-3 border-b-4 border-black">
                <button onclick="addEntity('rectangle')" class="w-full bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg border-2 border-black font-black text-sm mb-2">
                    <i class="fas fa-square mr-2"></i> Add Rectangle
                </button>
                <button onclick="addEntity('sprite')" class="w-full bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg border-2 border-black font-black text-sm">
                    <i class="fas fa-image mr-2"></i> Add Sprite
                </button>
            </div>
            <div id="entityList" class="flex-1 overflow-y-auto p-2 space-y-2">
                <!-- Entities will be added here -->
            </div>
        </div>

        <!-- Center: Canvas / Game Preview -->
        <div class="flex-1 bg-white border-4 border-black rounded-xl overflow-hidden flex flex-col">
            <div class="bg-slate-800 text-white px-4 py-2 font-black flex justify-between items-center border-b-4 border-black">
                <span><i class="fas fa-eye mr-2"></i>Preview</span>
                <div class="flex gap-2">
                    <button onclick="setTool('select')" class="px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 text-xs">
                        <i class="fas fa-mouse-pointer"></i>
                    </button>
                    <button onclick="setTool('move')" class="px-2 py-1 rounded bg-slate-600 hover:bg-slate-500 text-xs">
                        <i class="fas fa-arrows-alt"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 relative bg-[#1a1a2e] overflow-hidden" id="canvasContainer">
                <canvas id="gameCanvas" width="800" height="600" class="absolute inset-0 m-auto"></canvas>
            </div>
        </div>

        <!-- Right Panel: Properties -->
        <div class="w-72 bg-white border-4 border-black rounded-xl overflow-hidden flex flex-col">
            <div class="bg-[#8b5cf6] text-white px-4 py-3 font-black border-b-4 border-black">
                <i class="fas fa-cog mr-2"></i> Properties
            </div>
            <div id="propertiesPanel" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div>
                    <label class="block font-black text-sm mb-2">Game Size</label>
                    <div class="flex gap-2">
                        <input type="number" id="gameWidth" value="800" class="w-20 px-2 py-1 border-2 border-black rounded font-mono text-sm" />
                        <span class="self-center">x</span>
                        <input type="number" id="gameHeight" value="600" class="w-20 px-2 py-1 border-2 border-black rounded font-mono text-sm" />
                    </div>
                </div>
                <div>
                    <label class="block font-black text-sm mb-2">Background Color</label>
                    <input type="color" id="bgColor" value="#1a1a2e" class="w-full h-10 border-2 border-black rounded cursor-pointer" />
                </div>
                <hr class="border-2 border-black" />
                <div id="entityProperties" class="hidden">
                    <h4 class="font-black text-sm mb-3">Entity Properties</h4>
                    <div class="space-y-3">
                        <div>
                            <label class="block text-xs font-bold mb-1">Name</label>
                            <input type="text" id="propName" class="w-full px-2 py-1 border-2 border-black rounded text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">X Position</label>
                            <input type="number" id="propX" class="w-full px-2 py-1 border-2 border-black rounded text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">Y Position</label>
                            <input type="number" id="propY" class="w-full px-2 py-1 border-2 border-black rounded text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">Width</label>
                            <input type="number" id="propWidth" class="w-full px-2 py-1 border-2 border-black rounded text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">Height</label>
                            <input type="number" id="propHeight" class="w-full px-2 py-1 border-2 border-black rounded text-sm" />
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-1">Color</label>
                            <input type="color" id="propColor" class="w-full h-8 border-2 border-black rounded cursor-pointer" />
                        </div>
                        <button onclick="deleteSelectedEntity()" class="w-full bg-[#ff6b6b] text-white px-3 py-2 rounded border-2 border-black font-black text-sm">
                            <i class="fas fa-trash mr-1"></i> Delete Entity
                        </button>
                    </div>
                </div>
                <div id="noSelection" class="text-center text-slate-400 py-8">
                    <i class="fas fa-mouse-pointer text-3xl mb-2"></i>
                    <p class="text-sm">Select an entity to edit its properties</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Game state
let rawGameData = '{{ game.game_data | safe if game and game.game_data else "{}" }}';
let gameData = {};
try {
    gameData = JSON.parse(rawGameData);
} catch(e) {
    gameData = {};
}
if (!gameData.entities) gameData.entities = [];
if (!gameData.width) gameData.width = 800;
if (!gameData.height) gameData.height = 600;
if (!gameData.backgroundColor) gameData.backgroundColor = '#1a1a2e';

let selectedEntity = null;
let currentTool = 'select';
let isDragging = false;
let dragStart = { x: 0, y: 0 };
let currentGameId = {{ game.id if game else 'null' }};

// Canvas setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = gameData.width;
canvas.height = gameData.height;

// Initialize
function init() {
    renderEntityList();
    drawCanvas();
    
    // Set up canvas events
    canvas.addEventListener('mousedown', handleMouseDown);
    canvas.addEventListener('mousemove', handleMouseMove);
    canvas.addEventListener('mouseup', handleMouseUp);
    
    // Update game size inputs
    document.getElementById('gameWidth').value = gameData.width;
    document.getElementById('gameHeight').value = gameData.height;
    document.getElementById('bgColor').value = gameData.backgroundColor;
    
    // Listen for property changes
    document.getElementById('gameWidth').addEventListener('change', updateGameSize);
    document.getElementById('gameHeight').addEventListener('change', updateGameSize);
    document.getElementById('bgColor').addEventListener('change', updateBgColor);
}

function renderEntityList() {
    const list = document.getElementById('entityList');
    list.innerHTML = '';
    
    gameData.entities.forEach((entity, index) => {
        const div = document.createElement('div');
        div.className = `p-2 rounded-lg border-2 cursor-pointer ${selectedEntity === index ? 'bg-[#8b5cf6] text-white border-black' : 'bg-slate-100 border-slate-300 hover:border-black'}`;
        div.innerHTML = `
            <div class="font-black text-sm flex items-center gap-2">
                <i class="fas ${entity.type === 'sprite' ? 'fa-image' : 'fa-square'}"></i>
                ${entity.name || 'Entity ' + (index + 1)}
            </div>
            <div class="text-xs opacity-75 mt-1">${entity.type} • ${entity.width}x${entity.height}</div>
        `;
        div.onclick = () => selectEntity(index);
        list.appendChild(div);
    });
}

function drawCanvas() {
    ctx.fillStyle = gameData.backgroundColor;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Draw grid
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 32) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 32) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Draw entities
    gameData.entities.forEach((entity, index) => {
        if (entity.type === 'rectangle') {
            ctx.fillStyle = entity.color || '#ff0000';
            ctx.fillRect(entity.x, entity.y, entity.width, entity.height);
            
            // Selection outline
            if (selectedEntity === index) {
                ctx.strokeStyle = '#8b5cf6';
                ctx.lineWidth = 3;
                ctx.strokeRect(entity.x - 2, entity.y - 2, entity.width + 4, entity.height + 4);
            }
        } else if (entity.type === 'sprite') {
            // Draw placeholder for sprite
            ctx.fillStyle = '#4f46e5';
            ctx.fillRect(entity.x, entity.y, entity.width, entity.height);
            ctx.fillStyle = '#fff';
            ctx.font = '12px sans-serif';
            ctx.fillText('Sprite', entity.x + 5, entity.y + 20);
            
            if (selectedEntity === index) {
                ctx.strokeStyle = '#8b5cf6';
                ctx.lineWidth = 3;
                ctx.strokeRect(entity.x - 2, entity.y - 2, entity.width + 4, entity.height + 4);
            }
        }
    });
}

function addEntity(type) {
    const entity = {
        type: type,
        name: type + '_' + (gameData.entities.length + 1),
        x: 50 + Math.random() * 100,
        y: 50 + Math.random() * 100,
        width: type === 'sprite' ? 32 : 64,
        height: type === 'sprite' ? 32 : 64,
        color: type === 'rectangle' ? '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0') : '#4f46e5'
    };
    gameData.entities.push(entity);
    selectedEntity = gameData.entities.length - 1;
    renderEntityList();
    drawCanvas();
    updatePropertyPanel();
}

function selectEntity(index) {
    selectedEntity = index;
    renderEntityList();
    drawCanvas();
    updatePropertyPanel();
}

function updatePropertyPanel() {
    const entityProps = document.getElementById('entityProperties');
    const noSelection = document.getElementById('noSelection');
    
    if (selectedEntity !== null && gameData.entities[selectedEntity]) {
        const entity = gameData.entities[selectedEntity];
        entityProps.classList.remove('hidden');
        noSelection.classList.add('hidden');
        
        document.getElementById('propName').value = entity.name || '';
        document.getElementById('propX').value = Math.round(entity.x);
        document.getElementById('propY').value = Math.round(entity.y);
        document.getElementById('propWidth').value = entity.width;
        document.getElementById('propHeight').value = entity.height;
        document.getElementById('propColor').value = entity.color || '#ff0000';
    } else {
        entityProps.classList.add('hidden');
        noSelection.classList.remove('hidden');
    }
}

function handleMouseDown(e) {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    // Check if clicking on an entity
    for (let i = gameData.entities.length - 1; i >= 0; i--) {
        const entity = gameData.entities[i];
        if (x >= entity.x && x <= entity.x + entity.width &&
            y >= entity.y && y <= entity.y + entity.height) {
            selectedEntity = i;
            isDragging = true;
            dragStart = { x: x - entity.x, y: y - entity.y };
            renderEntityList();
            drawCanvas();
            updatePropertyPanel();
            return;
        }
    }
    
    // Deselect if clicking empty space
    selectedEntity = null;
    renderEntityList();
    drawCanvas();
    updatePropertyPanel();
}

function handleMouseMove(e) {
    if (isDragging && selectedEntity !== null) {
        const rect = canvas.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        
        gameData.entities[selectedEntity].x = x - dragStart.x;
        gameData.entities[selectedEntity].y = y - dragStart.y;
        
        drawCanvas();
        
        // Update property panel in real-time
        if (document.getElementById('propX')) {
            document.getElementById('propX').value = Math.round(gameData.entities[selectedEntity].x);
            document.getElementById('propY').value = Math.round(gameData.entities[selectedEntity].y);
        }
    }
}

function handleMouseUp() {
    isDragging = false;
}

function setTool(tool) {
    currentTool = tool;
}

function updateGameSize() {
    gameData.width = parseInt(document.getElementById('gameWidth').value) || 800;
    gameData.height = parseInt(document.getElementById('gameHeight').value) || 600;
    canvas.width = gameData.width;
    canvas.height = gameData.height;
    drawCanvas();
}

function updateBgColor() {
    gameData.backgroundColor = document.getElementById('bgColor').value;
    drawCanvas();
}

// Property change handlers
document.addEventListener('DOMContentLoaded', () => {
    const props = ['propName', 'propX', 'propY', 'propWidth', 'propHeight', 'propColor'];
    props.forEach(prop => {
        document.getElementById(prop)?.addEventListener('change', (e) => {
            if (selectedEntity !== null) {
                const entity = gameData.entities[selectedEntity];
                switch(prop) {
                    case 'propName': entity.name = e.target.value; break;
                    case 'propX': entity.x = parseFloat(e.target.value); break;
                    case 'propY': entity.y = parseFloat(e.target.value); break;
                    case 'propWidth': entity.width = parseInt(e.target.value); break;
                    case 'propHeight': entity.height = parseInt(e.target.value); break;
                    case 'propColor': entity.color = e.target.value; break;
                }
                renderEntityList();
                drawCanvas();
            }
        });
    });
});

function deleteSelectedEntity() {
    if (selectedEntity !== null) {
        gameData.entities.splice(selectedEntity, 1);
        selectedEntity = null;
        renderEntityList();
        drawCanvas();
        updatePropertyPanel();
    }
}

// Save and Export functions
async function saveGame() {
    const gameId = {{ game.id if game else 'null' }};
    const name = document.getElementById('gameName').value;
    
    const response = await fetch('/api/melon-games/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            id: gameId,
            name: name,
            gameData: gameData
        })
    });
    
    const result = await response.json();
    if (result.success) {
        alert('Game saved successfully!');
        if (!gameId) {
            window.location.href = '/melon-games/' + result.id;
        }
    } else {
        alert('Failed to save game');
    }
}

function playGame() {
    const gameId = {{ game.id if game else 'null' }};
    if (gameId) {
        window.open('/melon-games/play/' + gameId, '_blank');
    } else {
        alert('Please save the game first!');
    }
}

async function exportGame(format) {
    const gameId = {{ game.id if game else 'null' }};
    if (!gameId) {
        alert('Please save the game first!');
        return;
    }
    
    const response = await fetch(`/api/melon-games/${gameId}/export`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ format: format })
    });
    
    if (format === 'html') {
        const html = await response.text();
        const blob = new Blob([html], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = document.getElementById('gameName').value.replace(/\s+/g, '_') + '.html';
        a.click();
    } else {
        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = document.getElementById('gameName').value.replace(/\s+/g, '_') + '.zip';
        a.click();
    }
}

// Initialize on load
init();
</script>
{% endblock %}
