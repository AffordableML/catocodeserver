<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ game.name }} - Play</title>
    <script src="https://cdn.jsdelivr.net/npm/melonjs@8.3.0/build/melonjs.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        #game-container {
            border: 4px solid #8b5cf6;
            box-shadow: 0 0 40px rgba(139, 92, 246, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        .header {
            color: white;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 5px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header a {
            color: #8b5cf6;
            text-decoration: none;
            font-weight: 600;
        }
        .header a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{ game.name }}</h1>
        <a href="/melon-games/{{ game.id }}">← Back to Editor</a>
    </div>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        // Game data from database
        const gameData = {{ game.game_data | safe if game.game_data else '{}' }};
        
        // Set canvas size
        const canvas = document.getElementById('gameCanvas');
        canvas.width = gameData.width || 800;
        canvas.height = gameData.height || 600;
        
        // Initialize MelonJS
        me.game = new me.Game(0, 0, {
            width: canvas.width,
            height: canvas.height,
            parent: 'game-container',
            renderer: me.AUTO,
            preferWebGL1: true
        });
        
        // Create entities from game data
        if (gameData.entities && gameData.entities.length > 0) {
            gameData.entities.forEach(entity => {
                // Create entity based on type
                if (entity.type === 'rectangle') {
                    me.game.world.addChild(
                        new me.Entity(entity.x, entity.y, {
                            width: entity.width,
                            height: entity.height,
                            shape: new me.Rectangle(0, 0, entity.width, entity.height)
                        })
                    );
                }
            });
        }
        
        // Add background
        me.game.world.addChild(
            new me.ColorLayer('background', gameData.backgroundColor || '#1a1a2e')
        );
        
        // Start game
        me.boot();
    </script>
</body>
</html>
