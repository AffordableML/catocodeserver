<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>CatoCode IDE</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #f8fafc;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            /* Cute Polka Dot Background for gaps */
            background-image: radial-gradient(#cbd5e1 2px, transparent 2px);
            background-size: 30px 30px;
        }

        #editor {
            font-family: 'JetBrains Mono', monospace !important;
            font-size: 14px !important;
        }

        /* Neobrutalist UI Utilities */
        .neo-btn {
            box-shadow: 3px 3px 0px 0px rgba(0, 0, 0, 1);
            transition: all 0.15s ease;
            border: 2px solid #000;
        }

        .neo-btn:hover:not(:disabled) {
            box-shadow: 0px 0px 0px 0px rgba(0, 0, 0, 1);
            transform: translate(3px, 3px);
        }

        .neo-btn:active:not(:disabled) {
            background-color: #cbd5e1;
        }

        /* Custom Drag Grips for Resizers */
        .resizer {
            cursor: col-resize;
            width: 12px;
            background-color: #ffc900;
            border-left: 3px solid #000;
            border-right: 3px solid #000;
            position: relative;
            transition: background-color 0.2s;
            z-index: 10;
        }

        .resizer::after {
            content: '⋮';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: black;
            font-size: 16px;
            color: #000;
        }

        .resizer:hover {
            background-color: #ff90e8;
        }

        /* Override JS Tab Styling safely without breaking JS logic */
        #tab-files,
        #tab-assets {
            border: 2px solid transparent;
            /* Invisible full border to prevent layout jumping */
            background: transparent;
            color: #64748b;
            transition: all 0.2s;
        }

        /* When editor.js sets the active tab class, we hijack it for neobrutalism */
        #tab-files.text-blue-600,
        #tab-assets.text-blue-600 {
            background-color: #20ffad !important;
            color: #000 !important;
            border: 2px solid #000 !important;
            /* Full border all the way around */
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 1) !important;
            transform: translateY(-2px);
            font-weight: 900 !important;
        }

        /* Scrollbars */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #fff;
            border-left: 2px solid #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #ff90e8;
            border: 2px solid #000;
        }
    </style>
</head>

<body class="text-slate-900 h-screen flex flex-col overflow-hidden p-2">
    <script>
        const PROJECT_DATA = {{ project_data| tojson }};
        // FIXED: Safely inject plugins array
        const ACTIVE_PLUGINS = {{ plugins| tojson | safe }};
    </script>

    <header
        class="h-16 border-4 border-black px-4 flex items-center justify-between bg-white z-20 rounded-t-xl shrink-0 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] mb-2 relative">
        <div class="flex items-center gap-4">

            <a href="/dashboard"
                class="flex items-center gap-2 group text-black hover:text-black transition-transform hover:scale-105">
                <div
                    class="w-8 h-8 bg-[#ffc900] border-2 border-black rounded-lg flex items-center justify-center neo-btn group-hover:rotate-12">
                    <i class="fas fa-code text-sm"></i>
                </div>
                <div class="flex items-center gap-2">
                    <span class="font-black text-xl tracking-tight leading-none">CatoCode</span>
                    <span
                        class="bg-[#ff90e8] text-black border-2 border-black px-2 py-0.5 text-xs font-black rounded-md neo-btn transform -translate-y-0.5">BETA</span>
                </div>
            </a>

            <div class="h-6 w-px bg-black opacity-20 ml-2"></div>

            <span
                class="font-black text-black bg-[#f8fafc] border-2 border-black px-3 py-1 rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] text-sm transform -rotate-1">
                {{ project_data.name }}
            </span>

            <button onclick="toggleMarkdownPreview()" id="md-preview-btn"
                class="hidden px-3 py-1 bg-[#e0b0ff] text-black border-2 border-black rounded font-black text-xs neo-btn ml-2">
                <i class="fas fa-eye mr-1"></i> MD Preview
            </button>
        </div>

        <div class="flex items-center gap-3">
            <button onclick="createNewFile()"
                class="px-4 py-2 bg-[#ffc900] text-black rounded-lg font-black text-sm neo-btn flex items-center">
                <i class="fas fa-file-plus mr-2"></i> File
            </button>
            <button onclick="deleteCurrentFile()"
                class="px-4 py-2 bg-[#ff6b6b] text-white rounded-lg font-black text-sm neo-btn flex items-center">
                <i class="fas fa-trash mr-2"></i> Delete
            </button>

            <div class="h-6 w-px bg-black opacity-20 mx-1"></div>

            <button id="save-btn"
                class="px-8 py-2 bg-[#20ffad] text-black rounded-lg font-black text-sm neo-btn flex items-center transform rotate-1">
                <i class="fas fa-save mr-2"></i> SAVE
            </button>
        </div>
    </header>

    <div
        class="flex-1 flex overflow-hidden border-4 border-black rounded-b-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] bg-white mb-2">
        <aside id="sidebar" class="w-64 bg-white flex flex-col shrink-0 relative">
            <div class="flex p-2 gap-2 bg-[#f8fafc] border-b-4 border-black shrink-0">
                <button class="flex-1 py-2 text-sm font-bold rounded-lg text-blue-600" id="tab-files">
                    <i class="fas fa-folder-open mr-1"></i> Files
                </button>
                <button class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500" id="tab-assets">
                    <i class="fas fa-image mr-1"></i> Assets
                </button>
            </div>

            <div id="file-tree" class="flex-1 overflow-y-auto p-3 font-mono text-sm bg-white"></div>

            <div id="asset-grid"
                class="flex-1 overflow-y-auto p-3 hidden grid grid-cols-2 gap-3 content-start bg-white"></div>

            <div class="p-3 border-t-4 border-black bg-[#fff9c4] flex gap-2 shrink-0">
                <button id="new-file"
                    class="flex-1 bg-white border-2 border-black py-2 rounded-lg text-xs font-black text-black neo-btn">
                    <i class="fas fa-plus mr-1"></i> FILE
                </button>
                <button id="upload-asset-btn"
                    class="flex-1 bg-black text-white border-2 border-black py-2 rounded-lg text-xs font-black neo-btn hover:bg-slate-800 hover:text-white">
                    <i class="fas fa-upload mr-1"></i> UPLOAD
                </button>
                <input type="file" id="upload-input" hidden multiple
                    accept="image/*,.html,.css,.js,.py,.json,.txt,.svg,.webp,.gif,.mp3,.wav,.mp4">
            </div>
        </aside>

        <!-- resizers removed to disable manual panel resizing -->

        <div class="flex-1 flex flex-col min-w-0 bg-[#1e1e1e] relative">
            <div id="editor" class="flex-1"></div>
        </div>

        <!-- resizers removed to disable manual panel resizing -->

        <aside id="preview-pane" class="w-1/3 flex flex-col shrink-0 bg-white">
            <div class="h-12 bg-[#ff90e8] border-b-4 border-black flex items-center justify-between px-4 shrink-0">
                <span class="font-black text-sm text-black uppercase tracking-widest flex items-center gap-2">
                    <i class="fas fa-play-circle"></i> Live Preview
                </span>
                <div class="flex items-center gap-2">
                    <button id="refresh"
                        class="w-8 h-8 bg-white border-2 border-black text-black rounded neo-btn flex items-center justify-center text-xs"
                        title="Reload Preview">
                        <i class="fas fa-rotate"></i>
                    </button>
                    <button id="open-preview-tab"
                        class="px-3 py-1 bg-white border-2 border-black text-black rounded neo-btn text-xs"
                        title="Open preview in new tab">
                        <i class="fas fa-external-link-alt"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 bg-white relative">
                <div
                    class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCI+CjxyZWN0IHdpZHRoPSIyMCIgaGVpZ2h0PSIyMCIgZmlsbD0iI2ZmZiIvPgo8cmVjdCB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNmMmYyZjIiLz4KPHJlY3QgeD0iMTAiIHk9IjEwIiB3aWR0aD0iMTAiIGhlaWdodD0iMTAiIGZpbGw9IiNmMmYyZjIiLz4KPC9zdmc+')] opacity-50 z-0">
                </div>
                <iframe id="preview-frame" class="w-full h-full border-none relative z-10 bg-transparent"></iframe>
            </div>
        </aside>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.32.3/ace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="{{ url_for('static', filename='js/editor.js') }}"></script>
    <script>
        // Apply Plugins Safely
        if (Array.isArray(ACTIVE_PLUGINS)) {
            ACTIVE_PLUGINS.forEach(code => {
                try {
                    // Wrap in IIFE to prevent scope pollution
                    (function () { eval(code); })();
                } catch (e) { console.error("Plugin Error:", e); }
            });
        }
    </script>
</body>

</html>
