<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}CatoCode{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Nunito:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            font-family: 'Nunito', sans-serif;
        }

        .font-mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Reusable UI elements for all pages */
        .neo-btn {
            box-shadow: 4px 4px 0px 0px rgba(0, 0, 0, 1);
            transition: all 0.2s ease;
        }

        .neo-btn:hover {
            box-shadow: 0px 0px 0px 0px rgba(0, 0, 0, 1);
            transform: translate(4px, 4px);
        }
    </style>
</head>

<body class="bg-[#f8fafc] text-slate-900 h-screen flex flex-col overflow-hidden">

    {% if not hide_nav %}
    <nav class="bg-white border-b-4 border-black px-8 h-20 flex items-center justify-between z-50">
        <a href="/" class="flex items-center gap-3 group">
            <div
                class="w-10 h-10 bg-[#ffc900] border-2 border-black rounded-xl flex items-center justify-center neo-btn group-hover:rotate-12">
                <i class="fas fa-code text-black text-lg"></i>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-2xl font-black text-black tracking-tight leading-none">CatoCode</span>
                <span
                    class="bg-[#ff90e8] text-black border-2 border-black px-2 py-0.5 text-xs font-black rounded-md neo-btn transform -translate-y-0.5">BETA</span>
            </div>
        </a>

        <div class="flex items-center gap-6 font-bold text-black">
            {% if current_user.is_authenticated %}
            <a href="/dashboard"
                class="bg-[#20ffad] text-black px-6 py-2.5 rounded-xl border-2 border-black neo-btn font-black flex items-center gap-2">
                Dashboard <i class="fas fa-arrow-right"></i>
            </a>
            {% else %}
            <a href="/login" class="hover:text-[#ff6b6b] transition-colors">Login</a>
            <a href="/register"
                class="bg-[#20ffad] text-black px-6 py-2.5 rounded-xl border-2 border-black neo-btn font-black">
                Sign Up
            </a>
            {% endif %}
        </div>
    </nav>
    {% endif %}

    <main class="flex-1 overflow-y-auto relative">
        {% block content %}{% endblock %}
    </main>

</body>

</html>
