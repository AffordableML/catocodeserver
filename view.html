<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Artwork - CatoArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="bg-white">

<div class="dotted-bg"></div>

<div class="content-wrapper">
    <!-- Navigation -->
    <nav class="border-b-4 border-black bg-white relative z-20">
        <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black border-2 border-black rounded-lg flex items-center justify-center">
                    <i class="fas fa-palette text-white"></i>
                </div>
                <span class="font-black text-2xl">CatoArt</span>
            </a>
            
            <div class="flex items-center gap-4">
                <a href="gallery.html" class="font-bold text-slate-600 hover:text-black">Gallery</a>
                <div id="auth-nav"></div>
            </div>
        </div>
    </nav>

    <!-- Artwork View -->
    <div class="max-w-6xl mx-auto px-8 py-12">
        <div class="grid md:grid-cols-2 gap-12">
            <!-- Artwork Display -->
            <div>
                <div class="bg-white border-4 border-black rounded-2xl p-8 neo-card mb-6">
                    <div class="bg-checkered rounded-lg p-8 flex items-center justify-center">
                        <canvas id="artwork-canvas" class="max-w-full" style="image-rendering: pixelated;"></canvas>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="flex gap-4">
                    <button id="like-btn" class="flex-1 bg-red-500 text-white px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                        <i class="fas fa-heart mr-2"></i><span id="like-text">Like</span> (<span id="like-count">0</span>)
                    </button>
                    <button id="remix-btn" class="flex-1 bg-[#4f46e5] text-white px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                        <i class="fas fa-copy mr-2"></i>Remix
                    </button>
                </div>
            </div>
            
            <!-- Artwork Info -->
            <div>
                <h1 id="artwork-title" class="text-5xl font-black mb-4">Loading...</h1>
                
                <div class="flex items-center gap-4 mb-6">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-user text-slate-600"></i>
                        <a id="artwork-author" href="#" class="font-bold text-slate-600 hover:text-black hover:underline">Anonymous</a>
                    </div>
                    <div class="flex items-center gap-2">
                        <i class="fas fa-calendar text-slate-600"></i>
                        <span id="artwork-date" class="font-bold text-slate-600">Just now</span>
                    </div>
                </div>
                
                <div class="bg-white border-2 border-black rounded-xl p-6 neo-card mb-6">
                    <h3 class="font-black text-lg mb-4">Details</h3>
                    <div class="space-y-2 font-bold text-slate-600">
                        <div class="flex justify-between">
                            <span>Dimensions:</span>
                            <span id="artwork-dimensions">-</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Likes:</span>
                            <span id="artwork-likes">0</span>
                        </div>
                        <div class="flex justify-between">
                            <span>Remixes:</span>
                            <span id="artwork-remixes">0</span>
                        </div>
                    </div>
                </div>
                
                <!-- Owner Actions -->
                <div id="owner-actions" class="hidden space-y-4">
                    <a id="edit-btn" href="#" class="block bg-[#20ffad] text-black px-6 py-3 font-black rounded-xl border-2 border-black neo-btn text-center">
                        <i class="fas fa-edit mr-2"></i>Edit Artwork
                    </a>
                    <button id="toggle-public-btn" class="w-full bg-[#ffc900] text-black px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                        <i class="fas fa-globe mr-2"></i><span id="public-text">Make Public</span>
                    </button>
                    <button id="delete-btn" class="w-full bg-red-500 text-white px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                        <i class="fas fa-trash mr-2"></i>Delete Artwork
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Remixes Section -->
        <div id="remixes-section" class="mt-16">
            <h2 class="text-3xl font-black mb-6">Remixes</h2>
            <div id="remixes-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script>
let currentUser = null;
let artwork = null;
let isLiked = false;

async function setupNav() {
    currentUser = await getCurrentUser();
    const authNav = document.getElementById('auth-nav');
    
    if (currentUser) {
        authNav.innerHTML = `
            <a href="dashboard.html" class="bg-[#20ffad] text-black px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                Dashboard
            </a>
        `;
    } else {
        authNav.innerHTML = `
            <a href="login.html" class="font-bold text-slate-600 hover:text-black">Login</a>
        `;
    }
}

async function loadArtwork() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        const artworkId = urlParams.get('id');
        
        if (!artworkId) {
            window.location.href = 'gallery.html';
            return;
        }
        
        // Get artwork
        const { data, error } = await supabase
            .from('artworks')
            .select(`
                *,
                users (username)
            `)
            .eq('id', artworkId)
            .single();
        
        if (error) throw error;
        artwork = data;
        
        // Display artwork
        document.getElementById('artwork-title').textContent = artwork.title;
        
        const authorLink = document.getElementById('artwork-author');
        if (artwork.user_id && artwork.users?.username) {
            authorLink.textContent = artwork.users.username;
            authorLink.href = `profile.html?id=${artwork.user_id}`;
        } else {
            authorLink.textContent = 'Anonymous';
            authorLink.href = '#';
            authorLink.classList.remove('hover:text-black', 'hover:underline');
            authorLink.style.cursor = 'default';
        }
        
        document.getElementById('artwork-dimensions').textContent = `${artwork.width}x${artwork.height}`;
        
        // Format date
        const date = new Date(artwork.created_at);
        document.getElementById('artwork-date').textContent = date.toLocaleDateString();
        
        // Draw canvas
        const canvas = document.getElementById('artwork-canvas');
        canvas.width = artwork.width;
        canvas.height = artwork.height;
        const ctx = canvas.getContext('2d');
        
        if (artwork.data && artwork.data.pixels) {
            const imageData = ctx.createImageData(artwork.width, artwork.height);
            artwork.data.pixels.forEach((color, i) => {
                const rgb = hexToRgb(color);
                imageData.data[i * 4] = rgb.r;
                imageData.data[i * 4 + 1] = rgb.g;
                imageData.data[i * 4 + 2] = rgb.b;
                imageData.data[i * 4 + 3] = 255;
            });
            ctx.putImageData(imageData, 0, 0);
        }
        
        // Load stats
        await loadStats();
        
        // Check if user is owner
        if (currentUser && currentUser.id === artwork.user_id) {
            document.getElementById('owner-actions').classList.remove('hidden');
            document.getElementById('edit-btn').href = `editor.html?id=${artwork.id}`;
            document.getElementById('public-text').textContent = artwork.is_public ? 'Make Private' : 'Make Public';
        }
        
        // Check if liked
        if (currentUser) {
            const { data: like } = await supabase
                .from('likes')
                .select('id')
                .eq('artwork_id', artworkId)
                .eq('user_id', currentUser.id)
                .single();
            
            isLiked = !!like;
            document.getElementById('like-text').textContent = isLiked ? 'Unlike' : 'Like';
        }
        
        // Load remixes
        await loadRemixes();
        
    } catch (error) {
        console.error('Error loading artwork:', error);
    }
}

async function loadStats() {
    try {
        // Count likes
        const { count: likesCount } = await supabase
            .from('likes')
            .select('*', { count: 'exact', head: true })
            .eq('artwork_id', artwork.id);
        
        document.getElementById('like-count').textContent = likesCount || 0;
        document.getElementById('artwork-likes').textContent = likesCount || 0;
        
        // Count remixes
        const { count: remixesCount } = await supabase
            .from('remixes')
            .select('*', { count: 'exact', head: true })
            .eq('original_id', artwork.id);
        
        document.getElementById('artwork-remixes').textContent = remixesCount || 0;
        
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

async function loadRemixes() {
    try {
        const { data: remixes } = await supabase
            .from('remixes')
            .select(`
                artwork_id,
                artworks (
                    id,
                    title,
                    thumbnail,
                    users (username)
                )
            `)
            .eq('original_id', artwork.id);
        
        const grid = document.getElementById('remixes-grid');
        
        if (!remixes || remixes.length === 0) {
            document.getElementById('remixes-section').style.display = 'none';
            return;
        }
        
        grid.innerHTML = remixes.map(remix => `
            <a href="view.html?id=${remix.artworks.id}" class="bg-white border-2 border-black rounded-xl overflow-hidden neo-card">
                <div class="aspect-square bg-slate-100 flex items-center justify-center p-4">
                    ${remix.artworks.thumbnail ? 
                        `<img src="${remix.artworks.thumbnail}" alt="${remix.artworks.title}" class="max-w-full max-h-full object-contain" style="image-rendering: pixelated;">` :
                        `<i class="fas fa-image text-4xl text-slate-300"></i>`
                    }
                </div>
                <div class="p-3 border-t-2 border-black">
                    <p class="font-black text-xs truncate">${remix.artworks.title}</p>
                    <p class="text-xs text-slate-600 font-bold truncate">${remix.artworks.users?.username}</p>
                </div>
            </a>
        `).join('');
        
    } catch (error) {
        console.error('Error loading remixes:', error);
    }
}

// Like button
document.getElementById('like-btn')?.addEventListener('click', async () => {
    if (!currentUser) {
        window.location.href = 'login.html';
        return;
    }
    
    try {
        if (isLiked) {
            await supabase
                .from('likes')
                .delete()
                .eq('artwork_id', artwork.id)
                .eq('user_id', currentUser.id);
            isLiked = false;
            document.getElementById('like-text').textContent = 'Like';
        } else {
            await supabase
                .from('likes')
                .insert([{
                    artwork_id: artwork.id,
                    user_id: currentUser.id
                }]);
            isLiked = true;
            document.getElementById('like-text').textContent = 'Unlike';
        }
        
        await loadStats();
    } catch (error) {
        console.error('Error toggling like:', error);
    }
});

// Remix button
document.getElementById('remix-btn')?.addEventListener('click', async () => {
    window.location.href = `editor.html?remix=${artwork.id}`;
});

// Toggle public
document.getElementById('toggle-public-btn')?.addEventListener('click', async () => {
    try {
        const { error } = await supabase
            .from('artworks')
            .update({ is_public: !artwork.is_public })
            .eq('id', artwork.id);
        
        if (error) throw error;
        
        artwork.is_public = !artwork.is_public;
        document.getElementById('public-text').textContent = artwork.is_public ? 'Make Private' : 'Make Public';
    } catch (error) {
        console.error('Error toggling public:', error);
    }
});

// Delete button
document.getElementById('delete-btn')?.addEventListener('click', async () => {
    if (!confirm('Are you sure you want to delete this artwork?')) return;
    
    try {
        const { error } = await supabase
            .from('artworks')
            .delete()
            .eq('id', artwork.id);
        
        if (error) throw error;
        
        window.location.href = 'dashboard.html';
    } catch (error) {
        console.error('Error deleting artwork:', error);
    }
});

function hexToRgb(hex) {
    const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
    } : { r: 0, g: 0, b: 0 };
}

document.addEventListener('DOMContentLoaded', async () => {
    await setupNav();
    await loadArtwork();
});
</script>

</body>
</html>
