<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - CatoArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="bg-white">

<div class="dotted-bg"></div>

<div class="content-wrapper">
    <!-- Navigation -->
    <nav class="border-b-4 border-black bg-white relative z-20">
        <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black border-2 border-black rounded-lg flex items-center justify-center">
                    <i class="fas fa-palette text-white"></i>
                </div>
                <span class="font-black text-2xl">CatoArt</span>
            </a>
            
            <div class="flex items-center gap-4">
                <a href="gallery.html" class="font-bold text-slate-600 hover:text-black">Gallery</a>
                <a href="editor.html" class="bg-[#20ffad] text-black px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                    <i class="fas fa-plus mr-2"></i>New Art
                </a>
                <button id="logout-btn" class="font-bold text-slate-600 hover:text-black">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="max-w-7xl mx-auto px-8 py-12">
        <!-- User Info -->
        <div class="mb-12">
            <h1 class="text-5xl font-black mb-2">My Dashboard</h1>
            <p class="text-xl text-slate-600 font-bold">Welcome back, <span id="username">Artist</span>!</p>
        </div>

        <!-- Stats -->
        <div class="grid md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-palette text-3xl text-[#ff6b6b]"></i>
                    <span id="artworks-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Artworks</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-heart text-3xl text-red-500"></i>
                    <span id="likes-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Likes Received</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-copy text-3xl text-[#4f46e5]"></i>
                    <span id="remixes-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Remixes</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-eye text-3xl text-[#ffc900]"></i>
                    <span id="public-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Public</p>
            </div>
        </div>

        <!-- My Artworks -->
        <div class="mb-12">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-3xl font-black">My Artworks</h2>
                <a href="editor.html" class="bg-[#20ffad] text-black px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                    <i class="fas fa-plus mr-2"></i>Create New
                </a>
            </div>
            
            <div id="my-artworks" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script src="static/js/dashboard.js"></script>

</body>
</html>
