<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - CatoArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="bg-white">

<div class="dotted-bg"></div>

<div class="content-wrapper">
    <!-- Navigation -->
    <nav class="border-b-4 border-black bg-white relative z-20">
        <div class="max-w-7xl mx-auto px-8 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3">
                <div class="w-10 h-10 bg-black border-2 border-black rounded-lg flex items-center justify-center">
                    <i class="fas fa-palette text-white"></i>
                </div>
                <span class="font-black text-2xl">CatoArt</span>
            </a>
            
            <div class="flex items-center gap-4">
                <a href="gallery.html" class="font-bold text-slate-600 hover:text-black">Gallery</a>
                <div id="auth-nav"></div>
            </div>
        </div>
    </nav>

    <!-- Profile Content -->
    <div class="max-w-7xl mx-auto px-8 py-12">
        <!-- User Info -->
        <div class="mb-12">
            <div class="flex items-center gap-6 mb-6">
                <div class="w-24 h-24 bg-[#20ffad] border-4 border-black rounded-2xl flex items-center justify-center neo-card">
                    <i class="fas fa-user text-5xl text-black"></i>
                </div>
                <div>
                    <h1 id="profile-username" class="text-5xl font-black mb-2">Loading...</h1>
                    <p class="text-xl text-slate-600 font-bold">Member since <span id="profile-date">-</span></p>
                </div>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid md:grid-cols-4 gap-6 mb-12">
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-palette text-3xl text-[#ff6b6b]"></i>
                    <span id="artworks-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Artworks</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-heart text-3xl text-red-500"></i>
                    <span id="likes-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Likes Received</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-copy text-3xl text-[#4f46e5]"></i>
                    <span id="remixes-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Remixes</p>
            </div>
            
            <div class="bg-white border-2 border-black rounded-xl p-6 neo-card">
                <div class="flex items-center justify-between mb-2">
                    <i class="fas fa-eye text-3xl text-[#ffc900]"></i>
                    <span id="public-count" class="text-4xl font-black">0</span>
                </div>
                <p class="font-bold text-slate-600">Public</p>
            </div>
        </div>

        <!-- Artworks -->
        <div class="mb-12">
            <h2 class="text-3xl font-black mb-6">Artworks</h2>
            
            <div id="profile-artworks" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Loaded via JS -->
            </div>
        </div>
    </div>
</div>

<script src="static/js/config.js"></script>
<script src="static/js/auth.js"></script>
<script>
let profileUserId = null;

async function setupNav() {
    const user = await getCurrentUser();
    const authNav = document.getElementById('auth-nav');
    
    if (user) {
        authNav.innerHTML = `
            <a href="dashboard.html" class="bg-[#20ffad] text-black px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                Dashboard
            </a>
        `;
    } else {
        authNav.innerHTML = `
            <a href="login.html" class="font-bold text-slate-600 hover:text-black">Login</a>
        `;
    }
}

async function loadProfile() {
    try {
        const urlParams = new URLSearchParams(window.location.search);
        profileUserId = urlParams.get('id');
        
        if (!profileUserId) {
            window.location.href = 'gallery.html';
            return;
        }
        
        // Get user profile
        const { data: profile, error } = await supabase
            .from('users')
            .select('*')
            .eq('id', profileUserId)
            .single();
        
        if (error) throw error;
        
        document.getElementById('profile-username').textContent = profile.username;
        
        const date = new Date(profile.created_at);
        document.getElementById('profile-date').textContent = date.toLocaleDateString();
        
        // Load stats
        await loadStats();
        
        // Load artworks
        await loadArtworks();
        
    } catch (error) {
        console.error('Error loading profile:', error);
        alert('Profile not found');
        window.location.href = 'gallery.html';
    }
}

async function loadStats() {
    try {
        // Count artworks
        const { count: artworksCount } = await supabase
            .from('artworks')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', profileUserId)
            .eq('is_public', true);
        
        document.getElementById('artworks-count').textContent = artworksCount || 0;

        // Count public artworks
        document.getElementById('public-count').textContent = artworksCount || 0;

        // Count likes received
        const { data: artworks } = await supabase
            .from('artworks')
            .select('id')
            .eq('user_id', profileUserId)
            .eq('is_public', true);
        
        if (artworks && artworks.length > 0) {
            const artworkIds = artworks.map(a => a.id);
            const { count: likesCount } = await supabase
                .from('likes')
                .select('*', { count: 'exact', head: true })
                .in('artwork_id', artworkIds);
            
            document.getElementById('likes-count').textContent = likesCount || 0;
        }

        // Count remixes
        const { count: remixesCount } = await supabase
            .from('remixes')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', profileUserId);
        
        document.getElementById('remixes-count').textContent = remixesCount || 0;

    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

async function loadArtworks() {
    try {
        const { data: artworks, error } = await supabase
            .from('artworks')
            .select('*')
            .eq('user_id', profileUserId)
            .eq('is_public', true)
            .order('created_at', { ascending: false });
        
        if (error) throw error;
        
        const container = document.getElementById('profile-artworks');
        
        if (!artworks || artworks.length === 0) {
            container.innerHTML = `
                <div class="col-span-full text-center py-12">
                    <i class="fas fa-palette text-6xl text-slate-300 mb-4"></i>
                    <p class="text-xl font-black text-slate-600">No public artworks yet</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = artworks.map(artwork => `
            <a href="view.html?id=${artwork.id}" class="bg-white border-2 border-black rounded-xl overflow-hidden neo-card group">
                <div class="aspect-square bg-slate-100 flex items-center justify-center p-4">
                    ${artwork.thumbnail ? 
                        `<img src="${artwork.thumbnail}" alt="${artwork.title}" class="max-w-full max-h-full object-contain" style="image-rendering: pixelated;">` :
                        `<i class="fas fa-image text-6xl text-slate-300"></i>`
                    }
                </div>
                <div class="p-4 border-t-2 border-black">
                    <h3 class="font-black text-sm mb-2 truncate">${artwork.title}</h3>
                    <div class="flex items-center justify-between text-xs text-slate-600 font-bold">
                        <span class="text-slate-500">${artwork.width}x${artwork.height}</span>
                    </div>
                </div>
            </a>
        `).join('');
        
    } catch (error) {
        console.error('Error loading artworks:', error);
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    await setupNav();
    await loadProfile();
});
</script>

</body>
</html>
