<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - CatoArt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="bg-white overflow-hidden">

<div class="dotted-bg"></div>

<div class="content-wrapper h-screen flex flex-col">
    <!-- Top Bar -->
    <div class="border-b-4 border-black bg-white relative z-20 flex-shrink-0">
        <div class="px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="flex items-center gap-2">
                    <div class="w-8 h-8 bg-black border-2 border-black rounded-lg flex items-center justify-center">
                        <i class="fas fa-palette text-white text-sm"></i>
                    </div>
                    <span class="font-black text-xl">CatoArt</span>
                </a>
            </div>
            
            <div class="flex items-center gap-3">
                <button id="import-btn" class="bg-[#4f46e5] text-white px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                    <i class="fas fa-upload mr-2"></i>Import
                </button>
                <button id="export-png-btn" class="bg-[#20ffad] text-black px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                    <i class="fas fa-download mr-2"></i>PNG
                </button>
                <button id="export-gif-btn" class="bg-[#ffc900] text-black px-6 py-2 font-black rounded-lg border-2 border-black neo-btn">
                    <i class="fas fa-file-image mr-2"></i>GIF
                </button>
            </div>
        </div>
    </div>

    <!-- Editor Content -->
    <div class="flex-1 flex overflow-hidden">
        <!-- Tools Panel -->
        <div class="w-64 border-r-4 border-black bg-white p-6 overflow-y-auto flex-shrink-0">
            <h3 class="font-black text-lg mb-4">Tools</h3>
            
            <div class="space-y-2 mb-6">
                <button onclick="setTool('pen')" class="tool-btn active w-full bg-[#20ffad] text-black px-4 py-3 font-black rounded-lg border-2 border-black neo-btn text-left">
                    <i class="fas fa-pen mr-2"></i>Pen
                </button>
                <button onclick="setTool('eraser')" class="tool-btn w-full bg-white text-black px-4 py-3 font-black rounded-lg border-2 border-black neo-btn text-left">
                    <i class="fas fa-eraser mr-2"></i>Eraser
                </button>
                <button onclick="setTool('fill')" class="tool-btn w-full bg-white text-black px-4 py-3 font-black rounded-lg border-2 border-black neo-btn text-left">
                    <i class="fas fa-fill-drip mr-2"></i>Fill
                </button>
                <button onclick="setTool('eyedropper')" class="tool-btn w-full bg-white text-black px-4 py-3 font-black rounded-lg border-2 border-black neo-btn text-left">
                    <i class="fas fa-eye-dropper mr-2"></i>Eyedropper
                </button>
            </div>
            
            <h3 class="font-black text-lg mb-4">Color</h3>
            <div class="mb-4">
                <input type="color" id="color-picker" value="#000000" class="w-full h-16 border-2 border-black rounded-lg cursor-pointer">
            </div>
            
            <h3 class="font-black text-lg mb-4">Palette</h3>
            <div id="color-palette" class="grid grid-cols-4 gap-2 mb-6">
                <!-- Generated via JS -->
            </div>
            
            <h3 class="font-black text-lg mb-4">Canvas Size</h3>
            <div class="space-y-2 mb-6">
                <button onclick="resizeCanvas(16, 16)" class="w-full bg-white text-black px-4 py-2 font-bold rounded-lg border-2 border-black neo-btn text-left text-sm">
                    16x16
                </button>
                <button onclick="resizeCanvas(32, 32)" class="w-full bg-white text-black px-4 py-2 font-bold rounded-lg border-2 border-black neo-btn text-left text-sm">
                    32x32
                </button>
                <button onclick="resizeCanvas(64, 64)" class="w-full bg-white text-black px-4 py-2 font-bold rounded-lg border-2 border-black neo-btn text-left text-sm">
                    64x64
                </button>
            </div>
            
            <h3 class="font-black text-lg mb-4">Onion Skin</h3>
            <label class="flex items-center gap-2 mb-6">
                <input type="checkbox" id="onion-skin-toggle" class="w-5 h-5 border-2 border-black rounded">
                <span class="font-bold">Show Previous Frame</span>
            </label>
            
            <div class="pt-6 border-t-2 border-black">
                <button onclick="clearCanvas()" class="w-full bg-red-500 text-white px-4 py-3 font-black rounded-lg border-2 border-black neo-btn">
                    <i class="fas fa-trash mr-2"></i>Clear Frame
                </button>
            </div>
        </div>

        <!-- Canvas Area -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="flex-1 flex items-center justify-center p-8 overflow-auto">
                <div class="bg-white border-4 border-black rounded-2xl p-8 neo-card">
                    <div class="bg-checkered rounded-lg p-4 inline-block relative">
                        <canvas id="onion-canvas" class="absolute top-4 left-4 pointer-events-none" style="image-rendering: pixelated; opacity: 0.3;"></canvas>
                        <canvas id="pixel-canvas" width="512" height="512" class="border-2 border-black cursor-crosshair relative z-10" style="image-rendering: pixelated;"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- Timeline -->
            <div class="border-t-4 border-black bg-white p-4">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="font-black text-lg">Timeline</h3>
                    <div class="flex gap-2">
                        <button onclick="addFrame()" class="bg-[#20ffad] text-black px-4 py-2 font-black rounded-lg border-2 border-black neo-btn text-sm">
                            <i class="fas fa-plus mr-1"></i>Add Frame
                        </button>
                        <button onclick="deleteFrame()" class="bg-red-500 text-white px-4 py-2 font-black rounded-lg border-2 border-black neo-btn text-sm">
                            <i class="fas fa-trash mr-1"></i>Delete
                        </button>
                        <button id="play-btn" onclick="togglePlay()" class="bg-[#4f46e5] text-white px-4 py-2 font-black rounded-lg border-2 border-black neo-btn text-sm">
                            <i class="fas fa-play mr-1"></i>Play
                        </button>
                    </div>
                </div>
                <div id="timeline" class="flex gap-2 overflow-x-auto pb-2">
                    <!-- Frames loaded via JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept="image/*" style="display: none;">

<!-- Import Modal -->
<div id="import-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white border-4 border-black rounded-2xl p-8 max-w-md w-full mx-4 neo-card">
        <h2 class="text-3xl font-black mb-4">Import Spritesheet</h2>
        <p class="text-slate-600 font-bold mb-4">Slice the imported image into frames:</p>
        
        <div class="space-y-4 mb-6">
            <div>
                <label class="block font-black mb-2">Frame Width (px)</label>
                <input type="number" id="slice-width" value="32" min="1" class="w-full px-4 py-2 border-2 border-black rounded-lg font-bold">
            </div>
            <div>
                <label class="block font-black mb-2">Frame Height (px)</label>
                <input type="number" id="slice-height" value="32" min="1" class="w-full px-4 py-2 border-2 border-black rounded-lg font-bold">
            </div>
        </div>
        
        <div class="flex gap-4">
            <button onclick="confirmImport()" class="flex-1 bg-[#20ffad] text-black px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                Import
            </button>
            <button onclick="cancelImport()" class="flex-1 bg-white text-black px-6 py-3 font-black rounded-xl border-2 border-black neo-btn">
                Cancel
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gif.js@0.2.0/dist/gif.js"></script>
<script src="static/js/editor.js"></script>

</body>
</html>
